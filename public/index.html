<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductCenter – YAML Editor (Build 19)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>ProductCenter</h1>
        <span class="subtitle">YAML Product Editor</span>
        <a href="/table"
            style="margin-left:auto; color:#c7d2fe; text-decoration:none; font-size:0.85em; padding:4px 10px; border:1px solid #c7d2fe; border-radius:6px; transition:all .15s;"
            onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.color='#fff'"
            onmouseout="this.style.background='';this.style.color='#c7d2fe'">Table View</a>
        <a href="/terminology"
            style="color:#c7d2fe; text-decoration:none; font-size:0.85em; padding:4px 10px; border:1px solid #c7d2fe; border-radius:6px; transition:all .15s;"
            onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.color='#fff'"
            onmouseout="this.style.background='';this.style.color='#c7d2fe'">Terminology</a>
        <span class="build-number">Build 19</span>
    </header>

    <div class="layout">
        <!-- Sidebar: file list -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Products</h2>
                <button id="btn-new" title="New Product">+ New</button>
            </div>
            <ul id="file-list"></ul>

            <div class="sidebar-header sidebar-header-templates">
                <h2>Templates</h2>
                <button id="btn-new-template" title="New Template">+ New</button>
            </div>
            <ul id="template-list"></ul>
        </aside>

        <!-- Main editor area -->
        <main id="editor-area">
            <div id="empty-state">
                <p>Select a product from the sidebar or create a new one.</p>
            </div>

            <div id="editor" class="hidden">
                <div class="editor-toolbar">
                    <h2 id="editor-title"></h2>
                    <div class="toolbar-actions">
                        <button id="btn-toggle-view" class="btn-secondary"
                            title="Switch between form and YAML view">YAML View</button>
                        <button id="btn-save" class="btn-primary">Save</button>
                        <button id="btn-delete" class="btn-danger">Delete</button>
                    </div>
                </div>

                <!-- Form View -->
                <div id="form-view">
                    <div id="form-container"></div>
                </div>

                <!-- YAML Raw View -->
                <div id="yaml-view" class="hidden">
                    <textarea id="yaml-raw" spellcheck="false"></textarea>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="hidden"></div>

    <!-- New Product Modal -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>New Product</h3>
            <label>Template:</label>
            <select id="template-select"></select>
            <label>Filename (without .yaml):</label>
            <input type="text" id="new-filename" placeholder="e.g. ethernet-switch-XY100">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-create" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- New Template Modal -->
    <div id="modal-overlay-template" class="hidden">
        <div class="modal">
            <h3>New Template</h3>
            <label>Filename (without .yaml):</label>
            <input type="text" id="new-template-filename" placeholder="e.g. media-converter">
            <div class="modal-actions">
                <button id="modal-template-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-template-create" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
