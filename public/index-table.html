<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductCenter – Table View (Build 20)</title>
    <link rel="stylesheet" href="style-table.css">
</head>

<body>
    <header>
        <h1>ProductCenter</h1>
        <span class="subtitle">YAML Product Editor</span>
        <div class="header-right">
            <a href="/" class="view-switch" title="Switch to classic stacked view">Classic View</a>
            <span class="build-number">Build 20 – Table</span>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar: file list -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Products</h2>
                <button id="btn-new" title="New Product">+ New</button>
            </div>
            <ul id="file-list"></ul>
        </aside>

        <!-- Main editor area -->
        <main id="editor-area">
            <div id="empty-state">
                <p>Select a product from the sidebar or create a new one.</p>
            </div>

            <div id="editor" class="hidden">
                <div class="editor-toolbar">
                    <h2 id="editor-title"></h2>
                    <div class="toolbar-actions">
                        <button id="btn-toggle-view" class="btn-secondary"
                            title="Switch between table and YAML view">YAML View</button>
                        <button id="btn-save" class="btn-primary">Save</button>
                        <button id="btn-delete" class="btn-danger">Delete</button>
                    </div>
                </div>

                <!-- Table View -->
                <div id="table-view">
                    <div id="table-container"></div>
                    <div class="table-footer-actions">
                        <button id="btn-add-root" class="btn-secondary btn-small">+ Add Root Property</button>
                    </div>
                </div>

                <!-- YAML Raw View -->
                <div id="yaml-view" class="hidden">
                    <textarea id="yaml-raw" spellcheck="false"></textarea>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="hidden"></div>

    <!-- New Product Modal -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>New Product</h3>
            <label>Template:</label>
            <select id="template-select"></select>
            <label>Filename (without .yaml):</label>
            <input type="text" id="new-filename" placeholder="e.g. ethernet-switch-XY100">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-create" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <script src="app-table.js"></script>
</body>

</html>
