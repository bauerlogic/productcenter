<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductCenter – Terminology Editor</title>
    <link rel="stylesheet" href="style-terminology.css">
</head>

<body>
    <header>
        <h1>ProductCenter</h1>
        <span class="subtitle">Terminology Editor</span>
        <div class="header-right">
            <a href="/" class="view-switch" title="Classic product editor">Products</a>
            <a href="/table" class="view-switch" title="Table product editor">Table View</a>
            <span class="build-number">Terminology</span>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar: file list -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Glossaries</h2>
                <button id="btn-new" title="New Terminology File">+ New</button>
            </div>
            <ul id="file-list"></ul>
        </aside>

        <!-- Main editor area -->
        <main id="editor-area">
            <div id="empty-state">
                <p>Select a terminology file from the sidebar or create a new one.</p>
            </div>

            <div id="editor" class="hidden">
                <div class="editor-toolbar">
                    <h2 id="editor-title"></h2>
                    <div class="toolbar-actions">
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="Filter terms…" />
                        </div>
                        <button id="btn-toggle-view" class="btn-secondary"
                            title="Switch between table and YAML view">YAML View</button>
                        <button id="btn-save" class="btn-primary">Save</button>
                        <button id="btn-delete" class="btn-danger">Delete</button>
                    </div>
                </div>

                <!-- Meta info bar -->
                <div id="meta-bar" class="meta-bar">
                    <label>Name: <input type="text" id="meta-name" /></label>
                    <label>Source: <input type="text" id="meta-source-lang" size="4" /></label>
                    <label>Target: <input type="text" id="meta-target-lang" size="4" /></label>
                    <label>Version: <input type="text" id="meta-version" size="6" /></label>
                    <label>Status:
                        <select id="meta-status">
                            <option value="draft">draft</option>
                            <option value="active">active</option>
                            <option value="archived">archived</option>
                        </select>
                    </label>
                    <span id="term-count" class="term-count"></span>
                </div>

                <!-- Table View -->
                <div id="table-view">
                    <div id="table-container"></div>
                </div>

                <!-- YAML Raw View -->
                <div id="yaml-view" class="hidden">
                    <textarea id="yaml-raw" spellcheck="false"></textarea>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="hidden"></div>

    <!-- New File Modal -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>New Terminology File</h3>
            <label>Name:</label>
            <input type="text" id="new-name" placeholder="e.g. Netzwerk-Switches Glasfaser">
            <label>Filename (without .yaml):</label>
            <input type="text" id="new-filename" placeholder="e.g. network-switches">
            <label>Source Language:</label>
            <input type="text" id="new-source-lang" value="de" size="4">
            <label>Target Language:</label>
            <input type="text" id="new-target-lang" value="en" size="4">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-create" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <script src="app-terminology.js"></script>
</body>

</html>
